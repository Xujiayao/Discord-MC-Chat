# ==================================================
# Discord-MC-Chat (DMCC)
# By Xujiayao
#
# Custom Messages file for DMCC version:
# Do NOT change this value manually!
version: ${mod_version}
#
# Code:     zh_cn
# Language: 简体中文（中国大陆）
#
# Discord-MC-Chat Docs:
# https://dmcc.xujiayao.com/
#
# Only edit the items below if you know what you are doing!
# ==================================================

templates: # You can add your own templates here
  - name: default
    with_webhook:
      standalone:
        username: "[{server}] {display_name}"
        content: "{message}"
      single_server:
        username: "{display_name}"
        content: "{message}"
    without_webhook:
      standalone: "[{server}] <{display_name}> {message}"
      single_server: "<{display_name}> {message}"

common:
  chat:
    - text: "[{server}] "
      bold: true
      color: "{server_color}"
    - text: "<{name}> "
      bold: false
      color: "{role_color}"
    - text: "{message}"
      bold: false
      color: "gray"
  others:
    - text: "[{server}] "
      bold: true
      color: "{server_color}"
    - text: "{message}"
      bold: false
      color: "gray"

discord_to_minecraft:
  response:  # 回复其它用户的消息时，原消息的格式
    - text: "    ┌──── "
      bold: true
      color: "dark_gray"
    - text: "<{name}> "
      bold: false
      color: "{role_color}"
    - text: "{message}"
      bold: false
      color: "dark_gray"
  command:
    - text: "[Discord] "
      bold: true
      color: "blue"
    - text: "{name} "
      bold: false
      color: "{role_color}"
    - text: "执行了 /{command} 命令！"
      bold: false
      color: "gray"

minecraft_to_discord:
  server:
    start: ":white_check_mark: **服务器已启动！**"
    stop: ":octagonal_sign: **服务器已关闭！**"
  player:
    join: ":wave: **{display_name} 加入了服务器**"
    quit: ":cry: **{display_name} 离开了服务器**"
    chat: default
    command: default
    die: ":skull: **{death_message}**"
    advancement:
      task: ":partying_face: **{display_name} 取得了进度 [{title}]**\\n       *{description}*"
      challenge: ":partying_face: **{display_name} 完成了挑战 [{title}]**\\n       *{description}*"
      goal: ":partying_face: **{display_name} 达成了目标 [{title}]**\\n       *{description}*"
  source:
    say: default
    tell_raw: default

rich_presence:
  all_servers_offline:
    playing_title: "{game_name}"
    first_line: "服务器离线"
    second_line: ""
  at_least_one_server_online:
    playing_title: "{game_name} ({online_player_count}/{max_player_count})"
    standalone:
      first_line: "{online_server_count} 个服务器在线"
      second_line: "[{online_server_list}]"
    single_server:
      first_line: "{online_player_count}/{max_player_count} 位玩家在线"
      second_line: "{total_player_count} 位玩家曾加入过"

channel_topic_updating:
  all_servers_offline: ":octagonal_sign: 服务器离线 | 最后更新于：<t:{last_update_time}:f>"
  at_least_one_server_online:
    standalone: ":white_check_mark: {online_player_count}/{max_player_count} 位玩家在线 | {total_player_count} 位玩家曾加入过 | {online_server_count} 个服务器在线 [{online_server_list}] | 服务器启动于 <t:{server_started_time}:R> | 最后更新于：<t:{last_update_time}:f>"
    single_server: ":white_check_mark: {online_player_count}/{max_player_count} 位玩家在线 | {total_player_count} 位玩家曾加入过 | 服务器启动于 <t:{server_started_time}:R> | 最后更新于：<t:{last_update_time}:f>"

mspt_monitoring:
  high_mspt: ":warning: **服务器 MSPT 已达 {mspt}！**"
