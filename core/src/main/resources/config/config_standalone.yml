# ==================================================
# Discord-MC-Chat (DMCC)
# By Xujiayao
#
# Config file for DMCC version & mode:
# Do NOT change these values manually!
version: ${mod_version}
mode: standalone
#
# Discord-MC-Chat Docs:
# https://dmcc.xujiayao.com/
# ==================================================

# 语言设置
language: "to_be_auto_replaced"

# 多服务器功能
multi_server:
  connection:
    host: "127.0.0.1"  # Limit accessibility, change to "0.0.0.0" if allow external connections
    port: 5000
    shared_secret: "to_be_auto_replaced"
  servers:
    # This list acts as a whitelist. Only clients with a server name defined here are allowed to connect.
    - name: "SMP"
      minecraft_version: "1.21.10"
      avatar_url: ""
      color: "yellow"
      start_command: "./SMP/start.bat"  # command or url

# Discord 设置
discord:
  # 机器人设置
  bot:
    token: "your_token_here"  # Discord 机器人令牌
    rich_presence: # TODO
      enable: true
  # Webhook 通用设置
  # 多服务器模式下，Webhook 用于发送客户端 MC 服务器消息，因此必须启用 Webhook
  webhook:
    allow_mentions: # 允许 Webhook 触发提及的对象
      - "everyone"
      - "users"
      - "roles"
    # 玩家聊天消息 Webhook 设置
    players:
      enable_fake_user_style: true  # 是否使用伪用户样式的 Webhook 发送玩家聊天消息
      avatar_url: "https://mc-heads.net/avatar/{player_name}.png"

# 消息广播设置
broadcasts:
  discord_to_minecraft: # true or false
    chat: true
    command: true
  minecraft_to_discord: # channel name, empty = disable
    server:
      started: "in-game-chat"
      stopped: "in-game-chat"
    player:
      join: "in-game-chat"
      quit: "in-game-chat"
      chat: "in-game-chat"
      command: "in-game-chat"
      die: "in-game-chat"
      advancement: "in-game-chat"
    source:
      say: "in-game-chat"
      tell_raw: "in-game-chat"

# 消息格式设置
formatting: # TODO
  format_chat_messages: true
  todo: true

# 命令过滤设置
excluded_commands:
  - "/msg (?!@a)(.*)"
  - "/tell (?!@a)(.*)"
  - "/tellraw (?!@a)(.*)"
  - "/w (?!@a)(.*)"
  - "/teammsg (.*)"
  - "/tm (.*)"
  - "/login (.*)"
  - "/l (.*)"
  - "/register (.*)"
  - "/reg (.*)"
  - "/account (.*)"
  - "/auth (.*)"

# MSPT 监控设置
mspt_monitoring:
  enable: true
  interval_seconds: 10
  threshold: 50
  channel: "in-game-chat"

# 控制台转发设置
console_forwarding:
  enable: true
  execute_messages_from_channel: true
  channels:
    - server: "SMP"
      channel: "console-smp"

# 频道主题更新设置
channel_topic_updating:
  enable: true
  interval_minutes: 10
  channel: "in-game-chat"

# 语音频道状态更新设置
voice_channels_updating:
  enable: true
  interval_minutes: 10
  server_status_channel_id: "111111"
  player_count_channel_id: "222222"

# 账户绑定设置
# 强制启用
account_linking:
  # 权限映射与同步：将 Discord 的身份映射为 Minecraft 的 OP 等级。
  # 这个 OP 等级将被用于决定该用户是否有权执行某些 DMCC 命令（包括 execute 的委托鉴权）。
  op_sync:
    # 开启后，DMCC 还会自动在游戏内赋予/撤销已绑定玩家实际的 OP 权限。
    sync_op_level_based_on_discord: true
    # 基于特定用户的映射（优先级最高）。
    user_mappings:
      - user: "xujiayao"
        op_level: 4
    # 基于身份组的映射。若用户有多个身份组，取映射的最高 OP 等级。
    role_mappings:
      # 示例 1：拥有 "Admins" 角色的用户将被视为 OP 3。
      - role: "Admins"
        op_level: 3
      # 示例 2：可将基础认证角色映射为 OP 0，使其有权执行无需特殊权限的 DMCC 命令（如委托执行白名单）。
      - role: "Players"
        op_level: 0
  use_role_colors_in_chat: true
  discord_mention_notifications:
    enable: true
    style: "action_bar"  # action_bar, title, or chat
  discord_user_avatar_for_webhooks: false

# DMCC 命令权限设置
# 配置要求执行命令的最低 OP 等级。
# 特殊值：
#   Level -1
#     允许任何人执行（包括未绑定账号的 Discord 游客）
# OP 等级对应的官方 Minecraft 权限级别：
#   Level 0 (normal)
#     Player has no special permissions.
#   Level 1 (moderator)
#     Player can bypass spawn protection.
#   Level 2 (gamemaster)
#     Player or executor can use more commands and player can use command blocks.
#   Level 3 (admin)
#     Player or executor can use commands related to multiplayer management.
#   Level 4 (owner)
#     Player or executor can use all the commands, including commands related to server management.
command_permission_levels:
  execute: -1
  help: -1
  info: -1
  log: 4
  reload: 4
  shutdown: 4 # This is for standalone DMCC only, which will exit JVM

# 检查更新设置
check_for_updates:
  enable: true  # 是否检查更新
  mention_admins: true  # 是否在更新通知中提及管理员
  channel: "in-game-chat"

# 关闭设置
shutdown:
  graceful_shutdown: true  # 是否优雅关闭 DMCC

# 统计数据收集设置
# 收集匿名的使用数据以帮助改进 DMCC
# 包括模组版本、服务器软件类型和版本、已启用的功能、各设置的选项、所属国家等信息
telemetry:
  enable: true
